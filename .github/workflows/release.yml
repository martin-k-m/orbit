name: Release

# Builds signed installers for macOS (Intel + Apple Silicon), Windows and Linux,
# publishes them — plus the updater `latest.json` and SHA256 checksums — to a
# GitHub Release, with the changelog attached.
# Trigger by pushing a semantic version tag (e.g. `v1.0.0`) or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}-dev', github.run_number) }}

jobs:
  publish:
    name: ${{ matrix.label }}
    # Windows code-signing cert (optional): set these repo secrets to sign the
    # Windows installers. Absent → the build runs unsigned exactly as before.
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-latest
            args: "--target aarch64-apple-darwin --config tauri.release.json"
          - label: macOS (Intel)
            os: macos-latest
            args: "--target x86_64-apple-darwin --config tauri.release.json"
          - label: Linux (x64)
            os: ubuntu-latest
            args: "--config tauri.release.json"
          - label: Windows (x64)
            os: windows-latest
            args: "--config tauri.release.json"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: npm install
        working-directory: apps/desktop/ui

      # Rebuild the platform icon set (.ico/.icns/PNGs) from the brand SVG so the
      # installers and app carry the current red Orbit logo, not a stale raster.
      - name: Regenerate app icons from the brand SVG
        run: npm run gen-icons
        working-directory: apps/desktop/ui

      # Import the Windows code-signing certificate (if provided) and point the
      # bundler at it, so the .msi / .exe are signed and don't trip SmartScreen.
      - name: Prepare Windows code signing
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'orbit-signing.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $securePwd = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $securePwd
          $confPath = 'apps/desktop/src-tauri/tauri.release.json'
          $conf = Get-Content $confPath -Raw | ConvertFrom-Json
          $win = [PSCustomObject]@{
            certificateThumbprint = $cert.Thumbprint
            digestAlgorithm       = 'sha256'
            timestampUrl          = 'http://timestamp.digicert.com'
          }
          $conf.bundle | Add-Member -NotePropertyName windows -NotePropertyValue $win -Force
          $conf | ConvertTo-Json -Depth 10 | Set-Content $confPath
          Write-Host "Windows signing configured (thumbprint $($cert.Thumbprint))."

      - name: Build, sign and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing + notarization (optional): set these repo secrets and
          # the macOS builds are signed with your Developer ID and notarized, so
          # Gatekeeper stops flagging them. Absent → unsigned, as before.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Orbit ${{ env.RELEASE_TAG }}"
          releaseBody: "Building assets… release notes and checksums are attached when all platforms finish."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  finalize:
    name: Checksums & release notes
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish checksums and attach the changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          mkdir -p dist && cd dist

          # Pull down every asset the matrix just uploaded (the release is a draft).
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*' --clobber

          # Checksums for everything except the checksum file itself.
          rm -f SHA256SUMS.txt
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
          gh release upload "$TAG" SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --clobber

          # Release notes = changelog + checksums.
          cd "$GITHUB_WORKSPACE"
          {
            cat RELEASE_NOTES.md
            echo
            echo '## Checksums (SHA256)'
            echo
            echo '```'
            cat dist/SHA256SUMS.txt
            echo '```'
          } > notes.md
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file notes.md
