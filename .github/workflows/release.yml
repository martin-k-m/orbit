name: Release

# Builds signed installers for macOS (Intel + Apple Silicon), Windows and Linux,
# publishes them — plus the updater `latest.json` and SHA256 checksums — to a
# GitHub Release, with the changelog attached.
# Trigger by pushing a semantic version tag (e.g. `v1.0.0`) or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}-dev', github.run_number) }}

jobs:
  publish:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-latest
            args: "--target aarch64-apple-darwin --config tauri.release.json"
          - label: macOS (Intel)
            os: macos-latest
            args: "--target x86_64-apple-darwin --config tauri.release.json"
          - label: Linux (x64)
            os: ubuntu-latest
            args: "--config tauri.release.json"
          - label: Windows (x64)
            os: windows-latest
            args: "--config tauri.release.json"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: npm install
        working-directory: apps/desktop/ui

      - name: Build, sign and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Orbit ${{ env.RELEASE_TAG }}"
          releaseBody: "Building assets… release notes and checksums are attached when all platforms finish."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  finalize:
    name: Checksums & release notes
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Publish checksums and attach the changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          mkdir -p dist && cd dist

          # Pull down every asset the matrix just uploaded (the release is a draft).
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*' --clobber

          # Checksums for everything except the checksum file itself.
          rm -f SHA256SUMS.txt
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
          gh release upload "$TAG" SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --clobber

          # Release notes = changelog + checksums.
          cd "$GITHUB_WORKSPACE"
          {
            cat RELEASE_NOTES.md
            echo
            echo '## Checksums (SHA256)'
            echo
            echo '```'
            cat dist/SHA256SUMS.txt
            echo '```'
          } > notes.md
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file notes.md
