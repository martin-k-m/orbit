name: Release

# Builds signed installers for macOS (Intel + Apple Silicon), Windows and Linux
# and publishes them — plus the updater `latest.json` — to a GitHub Release.
# Trigger by pushing a version tag (e.g. `v1.0.0`) or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-latest
            args: "--target aarch64-apple-darwin --config tauri.release.json"
          - label: macOS (Intel)
            os: macos-latest
            args: "--target x86_64-apple-darwin --config tauri.release.json"
          - label: Linux (x64)
            os: ubuntu-latest
            args: "--config tauri.release.json"
          - label: Windows (x64)
            os: windows-latest
            args: "--config tauri.release.json"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: npm install
        working-directory: apps/desktop/ui

      - name: Build, sign and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for signed updater artifacts — set these repo secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}-dev', github.run_number) }}
          releaseName: "Orbit ${{ github.ref_type == 'tag' && github.ref_name || 'dev build' }}"
          releaseBody: |
            See the assets below to download and install Orbit for your platform.

            - macOS: `.dmg` (Apple Silicon and Intel)
            - Windows: `.msi` / `.exe`
            - Linux: `.AppImage` / `.deb`

            Full notes: https://github.com/martin-k-m/orbit/blob/main/RELEASE_NOTES.md
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
