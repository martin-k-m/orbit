name: Website

# Builds the Next.js site (static export) and deploys it to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "apps/website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
        env:
          # Project site is served under https://<user>.github.io/orbit
          NEXT_PUBLIC_BASE_PATH: /orbit
      - name: Ensure .nojekyll (serve _next/ assets)
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
