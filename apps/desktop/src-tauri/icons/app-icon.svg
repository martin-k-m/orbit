<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17090b"/>
      <stop offset="1" stop-color="#0a0708"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#DC2626" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0.4" cy="0.34" r="0.8">
      <stop offset="0" stop-color="#FECDD3"/>
      <stop offset="0.4" stop-color="#F43F5E"/>
      <stop offset="1" stop-color="#DC2626"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DC2626"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square backdrop -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bgGlow)"/>

  <g transform="translate(256 256)">
    <!-- Core glow (layered translucent, no filter) -->
    <circle r="140" fill="#F43F5E" opacity="0.16"/>
    <circle r="112" fill="#F43F5E" opacity="0.20"/>
    <circle r="86" fill="#DC2626" opacity="0.30"/>

    <!-- Orbit ring + electron -->
    <g transform="rotate(-28)">
      <ellipse rx="208" ry="88" fill="none" stroke="url(#ring)" stroke-width="26"/>
      <circle cx="182" cy="-92" r="30" fill="#FB7185"/>
      <circle cx="182" cy="-92" r="44" fill="#FB7185" opacity="0.3"/>
    </g>

    <!-- Core -->
    <circle r="80" fill="url(#core)"/>
    <circle r="80" fill="none" stroke="#FECACA" stroke-opacity="0.3" stroke-width="3"/>
  </g>
</svg>
