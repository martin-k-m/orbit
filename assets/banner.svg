<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" fill="none" role="img" aria-label="Orbit — your development workflow, unified">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08080B"/>
      <stop offset="1" stop-color="#101019"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C7C9FF"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="0" fill="url(#bg)"/>
  <circle cx="250" cy="180" r="230" fill="url(#glow)"/>

  <!-- Orbit mark -->
  <g transform="translate(250 180)">
    <g transform="rotate(-22)">
      <ellipse cx="0" cy="0" rx="150" ry="86" stroke="url(#ring)" stroke-width="8" fill="none" opacity="0.95"/>
      <circle cx="-128" cy="52" r="17" fill="#F5F5FA"/>
    </g>
    <circle cx="0" cy="0" r="52" fill="#A9B0FF" filter="url(#soft)" opacity="0.6"/>
    <circle cx="0" cy="0" r="40" fill="#EDEEFF"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(560 120)">
    <text x="0" y="0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="96" font-weight="700" fill="url(#word)" letter-spacing="-2">Orbit</text>
    <text x="4" y="60" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#B9BBD6">Your development workflow, unified.</text>
    <text x="4" y="108" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#7B7E9E">A local-first developer command center · no server · no telemetry</text>
    <g transform="translate(4 140)" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600">
      <rect x="0" y="0" width="92" height="34" rx="17" fill="#1A1A24" stroke="#2A2A3A"/>
      <text x="46" y="22" fill="#C9CBEA" text-anchor="middle">Rust</text>
      <rect x="104" y="0" width="70" height="34" rx="17" fill="#1A1A24" stroke="#2A2A3A"/>
      <text x="139" y="22" fill="#C9CBEA" text-anchor="middle">Tauri</text>
      <rect x="182" y="0" width="86" height="34" rx="17" fill="#1A1A24" stroke="#2A2A3A"/>
      <text x="225" y="22" fill="#C9CBEA" text-anchor="middle">React</text>
      <rect x="276" y="0" width="92" height="34" rx="17" fill="#1A1A24" stroke="#2A2A3A"/>
      <text x="322" y="22" fill="#C9CBEA" text-anchor="middle">SQLite</text>
    </g>
  </g>
</svg>
