<!-- GitHub social preview (1280×640). Export to PNG for the repo's social image. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" fill="none" role="img" aria-label="Orbit — the local developer command center">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07070B"/>
      <stop offset="1" stop-color="#111120"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C9CBFF"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="10"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="410" cy="300" r="330" fill="url(#glow)"/>

  <!-- Mark -->
  <g transform="translate(410 300)">
    <g transform="rotate(-22)">
      <ellipse cx="0" cy="0" rx="205" ry="118" stroke="url(#ring)" stroke-width="11" fill="none"/>
      <circle cx="-175" cy="72" r="24" fill="#F5F5FA"/>
    </g>
    <circle cx="0" cy="0" r="72" fill="#A9B0FF" filter="url(#soft)" opacity="0.55"/>
    <circle cx="0" cy="0" r="56" fill="#EDEEFF"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(720 232)">
    <text x="0" y="0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="128" font-weight="800" letter-spacing="-3" fill="url(#word)">Orbit</text>
    <text x="4" y="66" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="34" font-weight="600" fill="#C3C5E6">The local developer command center.</text>
    <text x="6" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#7C7FA0">Projects · Commands · Git · Health · Analytics — all on your machine</text>
    <g transform="translate(6 150)" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#AEB0D6">
      <rect x="0" y="0" width="120" height="40" rx="20" fill="#17172099" stroke="#2C2C3E"/>
      <text x="60" y="26" text-anchor="middle">Local-first</text>
      <rect x="134" y="0" width="150" height="40" rx="20" fill="#17172099" stroke="#2C2C3E"/>
      <text x="209" y="26" text-anchor="middle">No telemetry</text>
      <rect x="298" y="0" width="140" height="40" rx="20" fill="#17172099" stroke="#2C2C3E"/>
      <text x="368" y="26" text-anchor="middle">Open source</text>
    </g>
  </g>
</svg>
